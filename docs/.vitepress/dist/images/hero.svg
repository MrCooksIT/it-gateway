<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6e5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071a30;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#bg)" rx="16"/>

  <!-- Grid dots decoration -->
  <g opacity="0.15" fill="#64ffda">
    <circle cx="40" cy="40" r="2"/><circle cx="80" cy="40" r="2"/><circle cx="120" cy="40" r="2"/>
    <circle cx="40" cy="80" r="2"/><circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/>
    <circle cx="360" cy="280" r="2"/><circle cx="400" cy="280" r="2"/><circle cx="440" cy="280" r="2"/>
    <circle cx="360" cy="320" r="2"/><circle cx="400" cy="320" r="2"/><circle cx="440" cy="320" r="2"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="#64ffda" stroke-width="1.5" opacity="0.3" fill="none">
    <line x1="20" y1="180" x2="100" y2="180"/>
    <circle cx="100" cy="180" r="3" fill="#64ffda"/>
    <line x1="100" y1="180" x2="100" y2="140"/>
    <line x1="380" y1="180" x2="460" y2="180"/>
    <circle cx="380" cy="180" r="3" fill="#64ffda"/>
    <line x1="380" y1="180" x2="380" y2="220"/>
  </g>

  <!-- Monitor outer frame -->
  <rect x="130" y="55" width="220" height="160" rx="10" fill="none" stroke="#64ffda" stroke-width="2.5" opacity="0.9"/>
  <!-- Monitor screen -->
  <rect x="140" y="65" width="200" height="140" fill="url(#screen)" rx="4"/>

  <!-- Code lines on screen -->
  <g opacity="0.9">
    <!-- Line 1: keyword -->
    <rect x="152" y="78" width="36" height="5" rx="2.5" fill="#ff79c6"/>
    <rect x="194" y="78" width="55" height="5" rx="2.5" fill="#a8b2d8" opacity="0.7"/>

    <!-- Line 2: indented -->
    <rect x="162" y="91" width="28" height="5" rx="2.5" fill="#64ffda"/>
    <rect x="196" y="91" width="20" height="5" rx="2.5" fill="#f1fa8c"/>
    <rect x="222" y="91" width="40" height="5" rx="2.5" fill="#a8b2d8" opacity="0.6"/>

    <!-- Line 3 -->
    <rect x="162" y="104" width="45" height="5" rx="2.5" fill="#64ffda"/>
    <rect x="213" y="104" width="30" height="5" rx="2.5" fill="#f1fa8c"/>

    <!-- Line 4: comment -->
    <rect x="152" y="117" width="70" height="5" rx="2.5" fill="#6272a4" opacity="0.8"/>

    <!-- Line 5 -->
    <rect x="162" y="130" width="38" height="5" rx="2.5" fill="#ff79c6"/>
    <rect x="206" y="130" width="55" height="5" rx="2.5" fill="#a8b2d8" opacity="0.7"/>

    <!-- Line 6 -->
    <rect x="162" y="143" width="52" height="5" rx="2.5" fill="#64ffda"/>
    <rect x="220" y="143" width="35" height="5" rx="2.5" fill="#f1fa8c"/>

    <!-- Line 7 -->
    <rect x="152" y="156" width="28" height="5" rx="2.5" fill="#ff79c6"/>

    <!-- Cursor blink -->
    <rect x="152" y="169" width="8" height="10" rx="1" fill="#64ffda" opacity="0.9"/>
  </g>

  <!-- Monitor stand -->
  <rect x="222" y="215" width="36" height="20" fill="#64ffda" opacity="0.5"/>
  <rect x="200" y="235" width="80" height="8" rx="4" fill="#64ffda" opacity="0.5"/>

  <!-- Text below -->
  <text x="240" y="278" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="1">IT Gateway</text>
  <text x="240" y="300" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#a8d8cf" letter-spacing="2">CAPS · GRADES 10 – 12</text>

  <!-- Small badge -->
  <rect x="168" y="316" width="144" height="26" rx="13" fill="#64ffda" opacity="0.15" stroke="#64ffda" stroke-width="1" opacity="0.4"/>
  <text x="240" y="333" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64ffda" letter-spacing="1">Theory · Practical · Quick Study</text>
</svg>
